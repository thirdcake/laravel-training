{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ range .Pages }}
    <article>
      {{ if .Params.subtitle }}
        <hgroup>
          <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
          <p>{{ .Params.subtitle }}</p>
        </hgroup>
      {{ else }}
        <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
      {{ end }}
    </article>
  {{ end }}
{{ end }}
